<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1><u>Know Your Customer(KYC) Form</u></h1>
    <h4>To be filled in black with BLOCK Letters</h4>
    <h3>Customer Details</h3>
    <form>
        <table>
            <tr>
                <td>
                    <label>First Name </label>
                    <td>
                        <input type="text" reqquired>
                    </td>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Middle Name </label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>
                    <label>Last Name </label>
                    <td>
                        <input type="text" required>
                    </td>
                </td>
            </tr>

            <tr>
                <td>
                    <h3>Gas Consumer Details</h3>
                </td>
            </tr>
            <tr>
                <td>Gas Consumer Number</td>
                <td><input type="text" pattern="[A-Z] {5} [0-9]{3}" required></td>

            </tr>

            <tr>
                <td>
                    <label>Fathers's Name </label>
                    <td>
                        <input type="text">
                    </td>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Mother's Name </label>
                    <td>
                        <input type="text">
                    </td>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Name of Spouse </label>
                    <td>
                        <input type="text">
                    </td>
                </td>
            </tr>



            <tr>
                <td>
                    <h3>Proof of Address {POA}</h3>
                </td>
            </tr>
            <tr>
                <td><label>Aadhar(UID)</label></td>
                <td><input type="checkbox" required></td>
            </tr>
            <tr>
                <td><label>PAN Number</label></td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <td><label>LIC Policy</label></td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <td><label>Lease Agreement</label></td>
                <td><input type="checkbox"></td>
            </tr>

            <tr>
                <td>
                    <h3>Contact Information</h3>
                </td>
            </tr>

            <tr>
                <td>
                    <label>House Number</label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>

            <tr>
                <td>
                    <label>State</label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>

            <tr>
                <td>
                    <label>District</label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>

            <td></td>
            <td></td>
            <tr>
                <td>
                    <input type="submit">
                </td>
                <td>
                    <input type="Reset">
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
